<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb</title>
    <link href="/output.css" rel="stylesheet">
  </head>
  <body class="bg-gradient-to-b from-gray-50 to-gray-100 min-h-screen">
    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <h1 class="text-3xl font-black text-red-500">airbnb</h1>
        <nav class="hidden sm:flex gap-6 text-gray-600 font-medium">
          <a href="#" class="hover:text-gray-900 transition">Homes</a>
          <a href="#" class="hover:text-gray-900 transition">Experiences</a>
        </nav>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <!-- Hero Section -->
      <section class="bg-white rounded-3xl shadow-lg p-8 sm:p-12 mb-12">
        <h2 class="text-4xl sm:text-5xl font-bold text-gray-900 mb-4">Find your next stay</h2>
        <p class="text-xl text-gray-600 mb-8">Discover unique homes and experiences around the world</p>
        <div class="flex flex-col sm:flex-row gap-4">
          <input type="text" placeholder="Where are you going?" class="flex-1 px-6 py-3 rounded-full border border-gray-300 focus:border-red-500 focus:outline-none focus:ring-2 focus:ring-red-200 transition" />
          <button class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-full transition transform hover:scale-105">Search</button>
        </div>
      </section>

      <!-- CTA Section -->
      <section class="bg-gradient-to-r from-red-500 to-red-600 rounded-2xl p-8 sm:p-12 text-white mb-12">
        <h3 class="text-2xl sm:text-3xl font-bold mb-4">Become a Host</h3>
        <p class="text-lg mb-6 opacity-90">Earn money by sharing your home</p>
        <a href="/host/add-home" class="inline-block bg-white text-red-600 font-bold py-3 px-8 rounded-full hover:bg-gray-100 transition transform hover:scale-105">
          Add Your Home
        </a>
      </section>
    </main>
  </body>
</html>
